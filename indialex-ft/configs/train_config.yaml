model:
  model_name: "meta-llama/Llama-3.2-3B-Instruct"

lora:
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05

training:
  batch_size: 4
  gradient_accumulation_steps: 4
  num_epochs: 3
  learning_rate: 2.0e-4
  max_seq_length: 2048
  warmup_ratio: 0.03
  weight_decay: 0.01

output:
  output_dir: "./outputs/indialex-ft"

logging:
  wandb_project: "indialex-ft"
